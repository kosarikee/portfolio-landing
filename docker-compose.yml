# ============================================================
# docker-compose.yml — Next.js + Nginx production
# ============================================================
# Запуск:
#   docker compose up -d
#
# С продакшен SSL (Let's Encrypt):
#   1. Укажите DOMAIN=ваш-домен.ru в .env
#   2. Запустите: docker compose --profile ssl run certbot
#   3. Перезапустите: docker compose down && docker compose up -d
# ============================================================

services:
  # ---------- Next.js приложение ----------
  next-app:
    image: portfolio-landing:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - NEXT_PUBLIC_EMAIL=${NEXT_PUBLIC_EMAIL}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-net

  # ---------- Nginx reverse proxy ----------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      next-app:
        condition: service_healthy
    networks:
      - app-net

volumes:
  ssl-certs:
  nginx-logs:

networks:
  app-net:
    driver: bridge
