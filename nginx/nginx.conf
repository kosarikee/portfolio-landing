# ============================================================
# nginx.conf — reverse proxy для Next.js + SSL
# ============================================================

# HTTP — редирект на HTTPS (в production)
server {
    listen 80 default_server;
    server_name _;

    # Для первого запуска без SSL — раскомментировать:
    # location / {
    #     proxy_pass http://next-app:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Редирект на HTTPS (когда SSL настроен)
    return 301 https://$host$request_uri;
}

# HTTPS — основная конфигурация
server {
    listen 443 ssl http2 default_server;
    server_name _;

    # SSL-сертификаты (Let's Encrypt / certbot)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL-параметры
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Заголовки безопасности
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Максимальный размер тела запроса (для загрузки фото отзывов)
    client_max_body_size 10M;

    # Прокси на Next.js
    location / {
        proxy_pass http://next-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Буферизация
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Статика напрямую от Nginx (кеширование)
    location /_next/static {
        proxy_pass http://next-app:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        proxy_pass http://next-app:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # favicon и robots
    location = /favicon.ico {
        proxy_pass http://next-app:3000;
        expires 30d;
        log_not_found off;
    }

    # Логи
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
